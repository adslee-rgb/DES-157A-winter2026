<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles.css" rel="stylesheet">
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <title>Matcha Cafe Game</title>
</head>
<body>
<header>
    <h1>Matcha Cafe Game</h1>        
</header>
<main>
        <!-- Start Overlay -->
    <div id="overlay">
        <button id="playBtn">Play!</button>
    </div>

        <!-- ORDER SCREEN -->
    <div id="orderScreen" class="hidden">
        <h2>Your Order</h2>
        <p id="orderText">Strawberry Matcha</p>
        <button id="startGame">Start Making Drink</button>
    </div>



    <!-- Main Game Content -->
    <div id="game">
        <h2>Main Game Screen</h2>
        <p>Matcha or Hojicha?</p>
        <img src="images/cup.jpeg" alt="cup"> <img src="images/strawberry.jpeg" alt="cup"> <img src="images/coconut.jpeg" alt="cup"> <img src="images/matchafoam.jpeg" alt="cup"> <img src="images/blacksesame.jpeg" alt="cup">
    </div>
</main>

</body>
</html>
