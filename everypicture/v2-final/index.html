<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Homemade+Apple&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <script src="script.js" defer></script>
  <title>help</title>
</head>
<body>
  <header>
    <h1>My Snoopy Shelf</h1>
    <p>(say hi to the Snoopys...!)</p>
  </header>

  <div class="shelf">
    <div class="item">
      <img src="images/blanket.png" alt="Blanket"
           data-desc="Hello! Welcome to the Snoopy shelf"
            data-overlay-desc="Me and my bro got matching Snoopy blankets for Christmas a few years ago. Let's just say I'm not the only one with a Snoopy shelf in the family.">

    </div>

    <div class="item">
      <img src="images/card.png" alt="Card"
           data-desc="An unexpected Snoopy card"
            data-overlay-desc="An unexpected friend gave me this card for my birthday last year and it was a sweet surprise. The Snoopy of it all honestly just made it more special. ">
    </div>

    <div class="item">
      <img src="images/shirt.png" alt="Shirt"
           data-desc="One of the many Snoopy shirts"
            data-overlay-desc="One of the many, many UNIQLO Peanuts items in my closet. I think my oldest UNIQLO Snoopy graphic tee is from almost 10 years ago T_T (yes it still fits me). This one just happens to the most recent addition.">
    </div>
  </div>

  <div class="shelf">
    <div class="item">
      <img src="images/key.png" alt="Keychain"
           data-desc="We're not Snoopy..."
            data-overlay-desc="Yeah so clearly these guys aren't Snoopy, but they are (I think?) my only Peanuts merch that aren't Snoopy related.These are both from a blind bag series that I can no longer find anywhere. Linus I got at a stationery shop in LA and Franklin was an impulse purchase at Target. Don't tell them but neither of them are my favorite character ...!>
    </div>

    <div class="item">
      <img src="images/craft.png" alt="Craft"
           data-desc="Deconstructed Snoopy"
            data-overlay-desc="My dad got me and my brother these craft kits for Christmas this past year. I got Snoopy and my brother got Woodstock. I recently tried building it but the pieces don't really fit together so I gave up.">
    </div>

    <div class="item">
      <img src="images/bag.png" alt="Bag"
           data-desc="This Snoopy loves Laufey"
          data-overlay-desc="I got this tote at a Laufey concert last September!!! This is a combination of my two favorite things I could not pass it up. I also got my friend one so now we match :p">
    </div>
  </div>

  <div class="shelf">
    <div class="item">
      <img src="images/plush.png" alt="Plush"
           data-desc="from Maddie"
          data-overlay-desc="My friend Maddie gave me this Snoopy for my birthday 2 years ago and it has laid at the corner of my bed ever since. Now I use him to hold up my Ipad when I watch Netflix while doing homework (ie. right now).">
    </div>

    <div class="item">
      <img src="images/twins.png" alt="Twins"
           data-desc="On accident"
          data-overlay-desc="Now I've known that people associate me with Snoopy for a while but this just sealed the deal. For my last birthday I got the same type of Snoopy plush from two different people haha... so now I just call them the twins.">
    </div>

    <div class="item">
      <img src="images/cup.png" alt="Cup"
           data-desc="Snoopy holds pencils"
          data-overlay-desc="This is the most recent addition to the Snoopy shelf, and it's from my friend Nadia. Would you believe me if I said I replaced a different Snoopy cup that was holding my pencils on my desk, with this one...">
    </div>
  </div>

</body>
</html>
